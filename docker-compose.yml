# ============================================================
# Docker Compose - Novel Backend (Azure Deployment)
# VM: Standard_B1ms (1 vCPU, 2GB RAM) - Ubuntu 24.04
# ============================================================

services:
  # ──────────────────────────────────────────────
  # PostgreSQL 18 + pgvector
  # ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg18
    container_name: pg_novel
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ${DB_NAME:-noveldb}
      TZ: "Asia/Ho_Chi_Minh"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-noveldb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Limit resources for B1ms VM (2GB RAM total)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ──────────────────────────────────────────────
  # Spring Boot Application
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novel-backend
    ports:
      - "8080:8080"
    environment:
      # ── Database ──
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/noveldb?TimeZone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-123456}

      # ── Gemini AI ──
      GEMINI_API_KEY: ${GEMINI_API_KEY}

      # ── JWT ──
      JWT_SECRET: ${JWT_SECRET}

      # ── Cloudinary ──
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      # ── Mail (Resend) ──
      MAIL_HOST: ${MAIL_HOST:-smtp.resend.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-resend}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM:-onboarding@resend.dev}

      # ── App URL (frontend) ──
      APP_URL: ${APP_URL:-http://localhost:3000}

      # ── JVM tuning for limited memory ──
      JAVA_OPTS: "-XX:MaxRAMPercentage=50.0 -XX:+UseG1GC"

      # ── Spring profiles ──
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}

      # ── Timezone ──
      TZ: "Asia/Ho_Chi_Minh"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M

volumes:
  postgres_data:
    driver: local

